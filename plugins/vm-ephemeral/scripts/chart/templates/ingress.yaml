{{- if eq (.Values._orion_ingress_provider | default "envoy-gateway") "nginx" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-url: "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/"
    kuiper.juno-innovations.com/ingress-extras: "/kubevirt-console/{{ .Values.name }}/vnc.html?keep_device_awake=true&reconnect=5000&autoconnect=true&resize=scale"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "30"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    nginx.ingress.kubernetes.io/session-cookie-name: "juno-console-session-{{ .Values.name }}"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/kubevirt-console/{{ .Values.name }}/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}-console
                port:
                  number: 8080
{{- else }}
# Envoy Gateway. HTTPRoute (path -> workstation svc) + SecurityPolicy whose
# extAuth points at hubble's auth-workstation endpoint via an EG Backend(FQDN)
# local to this namespace (the cross-ns FQDN the nginx auth-url used).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}
spec:
  parentRefs:
    - name: {{ .Values._orion_gateway_name | default "juno" }}
      namespace: {{ .Values._orion_gateway_namespace | default "envoy-gateway-system" }}
  hostnames:
    - {{ .Values.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/kubevirt-console/{{ .Values.name }}/"
      backendRefs:
        - name: {{ .Values.name }}-console
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: {{ .Values.name }}-auth-backend
spec:
  endpoints:
    - fqdn:
        hostname: "hubble.{{ .Release.Namespace }}.svc.cluster.local"
        port: 3000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.name }}-auth-workstation
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ .Values.name }}
  extAuth:
    failOpen: false
    headersToExtAuth:
      - Cookie
    http:
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ .Values.name }}-auth-backend
      pathOverride: "/api/auth-workstation/{{ .Values.name }}/"
{{- end }}
