{{- if eq (.Values._orion_ingress_provider | default "envoy-gateway") "nginx" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/auth-url: "http://hubble.{{ .Release.Namespace }}.svc.cluster.local:3000/api/auth-workstation/{{ .Values.name }}/"
spec:
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: "/polaris/{{ .Values.name }}/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}-jupyter-notebook
                port:
                  number: 8888
{{- else }}
# Envoy Gateway. HTTPRoute (path -> workstation svc) + SecurityPolicy whose
# extAuth points at hubble's auth-workstation endpoint via an EG Backend(FQDN)
# local to this namespace (the cross-ns FQDN the nginx auth-url used).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}
spec:
  parentRefs:
    - name: {{ .Values._orion_gateway_name | default "juno" }}
      namespace: {{ .Values._orion_gateway_namespace | default "envoy-gateway-system" }}
  hostnames:
    - {{ .Values.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/polaris/{{ .Values.name }}/"
      backendRefs:
        - name: {{ .Values.name }}-jupyter-notebook
          port: 8888
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: {{ .Values.name }}-auth-backend
spec:
  endpoints:
    - fqdn:
        hostname: "hubble.{{ .Release.Namespace }}.svc.cluster.local"
        port: 3000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.name }}-auth-workstation
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ .Values.name }}
  extAuth:
    failOpen: false
    headersToExtAuth:
      - Cookie
    http:
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: {{ .Values.name }}-auth-backend
      pathOverride: "/api/auth-workstation/{{ .Values.name }}/"
{{- end }}
